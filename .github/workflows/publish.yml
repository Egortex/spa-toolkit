name: Publish package to npm

on:
  push:
    tags:
      - "spa-router-v*"
      - "bind-form-v*"
      - "dom-template-v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Пакет для публикации"
        type: choice
        required: true
        options:
          - spa-router
          - bind-form
          - dom-template

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Resolve package
        id: package
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            name="${{ inputs.package }}"
          else
            tag="${GITHUB_REF_NAME}"
            name="${tag%-v*}"
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=packages/${{ steps.package.outputs.name }}

      - name: Publish
        run: npm publish --access public --workspace=packages/${{ steps.package.outputs.name }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
